name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python tools/check_release.py --tag "$GITHUB_REF_NAME"

  portable:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - id: version
        shell: bash
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - run: python -m pip install -e ".[test,build]"
      - run: pytest
      - run: python tools/check_release.py --tag "$GITHUB_REF_NAME"
      - run: python packaging/build.py
      - if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/WXDocFormat.app "wx-doc-format-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip"
      - if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/WXDocFormat -DestinationPath "wx-doc-format-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: wx-doc-format-${{ steps.version.outputs.value }}-${{ matrix.platform }}.zip
          if-no-files-found: error

  kylin:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: kylin-v10-x86_64
            architecture: x86_64
            image: quay.io/pypa/manylinux2014_x86_64
          - os: ubuntu-24.04-arm
            platform: kylin-v10-arm64
            architecture: arm64
            image: quay.io/pypa/manylinux2014_aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        run: echo "value=$(cat VERSION)" >> "$GITHUB_OUTPUT"
      - name: Build in the Linux compatibility container
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp/wxdoc-home \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            --entrypoint /bin/bash \
            "${{ matrix.image }}" \
            packaging/kylin/build_in_container.sh \
            "${{ steps.version.outputs.value }}" \
            "${{ matrix.architecture }}"
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.platform }}
          path: wx-doc-format-${{ steps.version.outputs.value }}-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  publish:
    needs: [portable, kylin]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum wx-doc-format-* > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
