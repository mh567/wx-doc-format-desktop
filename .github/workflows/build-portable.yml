name: Build portable packages

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: macos-arm64
          - os: windows-latest
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[test,build]"
      - run: pytest
      - run: python packaging/build.py
      - if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent dist/WXDocFormat.app wx-doc-format-${{ matrix.artifact }}.zip
      - if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/WXDocFormat -DestinationPath wx-doc-format-${{ matrix.artifact }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: wx-doc-format-${{ matrix.artifact }}
          path: wx-doc-format-${{ matrix.artifact }}.zip
          if-no-files-found: error
